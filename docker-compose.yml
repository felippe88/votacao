services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: votacao
      POSTGRES_USER: votacao
      POSTGRES_PASSWORD: votacao
    ports:
      - "5432:5432"
    volumes:
      - votacao-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U votacao -d votacao"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      APP_BASE_URL: http://localhost:8080
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/votacao
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  votacao-db-data:
